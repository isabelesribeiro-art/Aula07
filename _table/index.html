<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,
        initial-scale=1.0">
        <title>Tabela Veículos | Vendas</title>
        <style>
            body {
                margin: 0px;
                padding: 30px;
                font-family: Arial, Helvetica, sans-serif;
                background-color: #f4f4f4;
                color: #222;
            }
            .container {
                max-width: 1000px;
                margin: 0 auto;
                background-color: #ffffff;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
            }
            h1 {
                text-align: center;
                margin-bottom: 10px;
            }
            p.descricao {
                text-align: center;
                margin-bottom: 30px;
                color: #555;
            }
            .imagem-topo {
                display: block;
                width: 180px;
                margin: 0 auto 20px auto;
                border-radius: 10px;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 20px;
                background-color: #fff;
            }
            th, td {
                border: 1px solid #333;
                padding: 12px;
                text-align: left;
                vertical-align: top;
            }
            thead th {
                background-color: #dcdcdc;
                font-weight: bold;
            }
            tbody tr:nth-child(even) {
                background-color: #f9f9f9;
            }
            tfoot td {
                background-color: #efefef;
                font-weight: bold;
                text-align: center;
            }
            .col-marca {
                width: 30%;
            }
            .col-modelo {
                width: 40%;
            }
            .col-ano {
                width: 30%;
            }
            .imagem-carros {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .imagem-carros img {
                width: 70px;
                height: 45px;
                object-fit: cover;
                border-radius: 6px;
                border: 1px solid #ccc;
            }

            .rodape-imagem {
                display: block;
                width: 120px;
                margin: 25px auto 0 auto;
                opacity: 0.9;
            }
        </style>

    </head>
    <body>
        <div class="container">
            <img class="imagem-topo" src="./img/corolla.img" 
            alt="Corolla Híbrido 2026">

            <h1>Tabela de Veículos | Vendas</h1>
            <p class="descricao">
                Tabela modelo de vendas, com as melhores marcas do
                Mercado!
            </p>

            <table>
                <thead>
                    <tr>
                        <th class="col-marca">Marca</th>
                        <th class="col-modelo">Modelo</th>
                        <th class="col-ano">Ano</th>
                    </tr>
                </thead>

                <!-- Início tbody -->
                 <tbody>
                    <!-- Veículos Toyota -->
                    <tr>
                        <td rowspan="2">Toyota</td>
                        <td>
                            <div class="imagem-carros">
                                <img src="./img/corolla.jpg"
                                alt="Toyota Corolla">
                                <span>Corolla</span>
                            </div>
                        </td>
                        <td>2026</td>
                    </tr>
                    <tr>
                        <td>
                            <div class="imagem-carros">
                                <img src="./img/camry.jpg" alt="Toyota
                                Camry">
                                <span>Camry</span>
                            </div>
                        </td>
                        <td>2026</td>
                    </tr>
                    <!-- Veículos Honda -->
                     <tr>
                        <td rowspan="3">Honda</td>
                        <td>
                            <div class="imagem-carros">
                                <img src="./img/civic.jpg" alt="Honda
                                Civic">
                                <span>Civic</span>
                            </div>
                        </td>
                        <td>2026</td>
                     </tr>
                     <tr>
                        <td>
                            <div class="imagem-carros">
                                <img src="./img/fit.jpg" alt="Honda
                                Fit">
                                <span>Fit</span>
                            </div>
                        </td>
                        <td>2026</td>
                     </tr>
                     <tr>
                        <td>
                            <div class="imagem-carros">
                                <img src="./img/city.jpg" alt="Honda
                                City">
                                <span>City</span>
                            </div>
                        </td>
                        <td>2026</td>
                     </tr>
                     <!-- Veículo Mitsubichi -->
                      <tr>
                        <td>Nitsubichi</td>
                        <td>
                            <div class="imagem-carros">
                                <img src="./img/lancer.jpg" 
                                alt="Mitsubichi Lancer">
                                <span>Lancer</span>
                            </div>
                        </td>
                        <td>2026</td>
                      </tr>
                 </tbody>
                 <!-- tfooter - Rodapé Tabela -->
                  <tfoot>
                    <tr>
                        <td colspan="3">Última atualização: 24/03/2026</td>
                    </tr>
                </tfoot>
            </table>

            <img class="rodape-imagem" src="./img/logo-loja.png"
            alt="Logotipo da Loja Master Multimarcas">
        </div>
    </body>
</html>
